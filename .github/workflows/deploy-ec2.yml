# EC2(Amazon Linux) + PM2 배포 예시
# 필수 Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY
#
# 서버에 반드시 git clone 된 디렉터리 필요 (예: /home/ec2-user/ignite)
# PM2 앱 이름 ignite, main 브랜치 가정. 경로/브랜치는 env 에 맞게 수정.

name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Amazon Linux ec2-user 홈 기준 (물결표 ~ 는 원격에서 안 열릴 수 있어 절대 경로 권장)
      DEPLOY_PATH: /home/ec2-user/ignite
      PM2_APP_NAME: ignite

    steps:
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -T 10 "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ env.DEPLOY_PATH }}"
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "::error::폴더가 없습니다: $DEPLOY_DIR — EC2에서 mkdir 후 git clone 하세요."
              exit 1
            fi
            cd "$DEPLOY_DIR"
            if [ ! -d .git ]; then
              echo "::error::Git 저장소가 아닙니다: $DEPLOY_DIR"
              echo "해결: ssh 접속 후 예) cd ~ && git clone https://github.com/<계정>/<저장소>.git ignite"
              echo "(이미 파일만 넣어둔 폴더면 이름 바꾼 뒤 빈 디렉터리에 clone 하거나, 해당 경로를 삭제 후 clone)"
              exit 1
            fi
            git config --global --add safe.directory "$(pwd)" || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            npm ci
            npm run build
            if pm2 describe ${{ env.PM2_APP_NAME }} >/dev/null 2>&1; then
              pm2 reload ${{ env.PM2_APP_NAME }}
            else
              pm2 start npm --name ${{ env.PM2_APP_NAME }} -- start
              pm2 save
            fi
