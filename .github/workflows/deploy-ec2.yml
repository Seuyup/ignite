# EC2(Amazon Linux) + PM2 배포 예시
# 필수 Secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY
#
# 서버에 앱 경로 ~/ignite, PM2 앱 이름 ignite, main 브랜치 가정.
# 다르면 아래 env 와 remote_script 를 수정하세요.

name: Deploy to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ~/ignite
      PM2_APP_NAME: ignite

    steps:
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -T 10 "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            git config --global --add safe.directory "$(pwd)" || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            npm ci
            npm run build
            if pm2 describe ${{ env.PM2_APP_NAME }} >/dev/null 2>&1; then
              pm2 reload ${{ env.PM2_APP_NAME }}
            else
              pm2 start npm --name ${{ env.PM2_APP_NAME }} -- start
              pm2 save
            fi
